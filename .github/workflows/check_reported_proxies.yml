name: Automated Proxy Report Checker

on:
  schedule:
    - cron: '*/15 * * * *' # Executes automatically every 30 minutes. Change to '0 * * * *' for hourly.
  workflow_dispatch:      # Enables a manual "Run Workflow" trigger button in your GitHub dashboard UI.

jobs:
  verify-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Clone Repository Workspace
        uses: actions/checkout@v3

      - name: Initialize Python Environment
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Configure Network Dependencies
        run: |
          pip install requests PySocks

      - name: Execute Verification Routine
        run: python proxy_report_checker.py
