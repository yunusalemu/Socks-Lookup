# .github/workflows/check_reported_proxies.yml
name: Check Reported Proxies

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes
  workflow_dispatch:           # manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Install dependencies
        run: pip install PySocks requests

      - name: Check proxies and post results
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
          API_SECRET:      ${{ secrets.API_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import socks
          import socket
          import concurrent.futures
          import requests
          import threading
          import os
          from datetime import datetime

          SCRIPT_URL = os.environ["APPS_SCRIPT_URL"]
          SECRET     = os.environ["API_SECRET"]

          lock = threading.Lock()

          # ── Same classify logic as your main checker ───────────────
          def classify_connection(isp_name):
              isp_lower = isp_name.lower()
              if any(x in isp_lower for x in [
                  "comcast", "spectrum", "verizon", "cable",
                  "dsl", "fiber", "fios"
              ]):
                  return "Residential"
              if any(x in isp_lower for x in [
                  "mobile", "cellular", "wireless", "lte", "4g", "5g"
              ]):
                  return "Cellular"
              if any(x in isp_lower for x in [
                  "hosting", "datacenter", "server", "cloud", "colo"
              ]):
                  return "Business"
              return "Residential"

          # ── Full check exactly like your test_proxy function ───────
          def check_proxy(host, port, username=None, password=None):
              """
              Tries SOCKS5 then SOCKS4.
              Uses credentials if provided (required for auth proxies).
              Does full geo lookup through the proxy.
              No exit IP stored.
              """
              for proxy_type, pname in [
                  (socks.SOCKS5, "SOCKS5"),
                  (socks.SOCKS4, "SOCKS4")
              ]:
                  try:
                      s = socks.socksocket()
                      s.set_proxy(
                          proxy_type,
                          host,
                          int(port),
                          username=username if username else None,
                          password=password if password else None
                      )
                      s.settimeout(8)
                      t = time.time() if False else None

                      import time as time_module
                      start = time_module.time()

                      s.connect(("www.sefan.ru", 80))
                      s.send(b"GET / HTTP/1.1\r\nHost: sefan.ru\r\n\r\n")
                      data    = s.recv(1024)
                      latency = int((time_module.time() - start) * 1000)
                      s.close()

                      if b"HTTP" not in data:
                          print(f"  {pname}: connected but no HTTP in response")
                          continue

                      print(f"  {pname}: connected in {latency}ms")

                      # Build proxy dict for geo lookup — with auth if needed
                      if username and password:
                          auth_str = f"{username}:{password}@"
                      else:
                          auth_str = ""

                      proxies_dict = {
                          "http":  f"socks5h://{auth_str}{host}:{port}",
                          "https": f"socks5h://{auth_str}{host}:{port}",
                      }

                      # Geo lookup through the proxy
                      geo = {}
                      try:
                          r = requests.get(
                              "http://ip-api.com/json",
                              proxies=proxies_dict,
                              timeout=10
                          )
                          if r.status_code == 200:
                              geo = r.json()
                              print(f"  Geo: {geo.get('country')} | "
                                    f"{geo.get('regionName')} | "
                                    f"{geo.get('city')} | "
                                    f"ISP: {geo.get('isp')}")
                          else:
                              print(f"  Geo lookup returned {r.status_code}")
                      except Exception as geo_err:
                          print(f"  Geo lookup failed: {geo_err}")

                      country      = geo.get("country",    "Unknown")
                      region       = geo.get("regionName", "Unknown")
                      city         = geo.get("city",       "Unknown")
                      zip_code     = geo.get("zip",        "Unknown")
                      isp          = geo.get("isp",        "Unknown")
                      use_type     = classify_connection(isp)

                      return {
                          "alive":     True,
                          "latency":   latency,
                          "proxyType": pname,
                          "country":   country,
                          "region":    region,
                          "city":      city,
                          "zip":       zip_code,
                          "isp":       isp,
                          "useType":   use_type,
                          "error":     ""
                      }

                  except Exception as ex:
                      print(f"  {pname} failed: {ex}")
                      continue

              # Both SOCKS5 and SOCKS4 failed
              return {
                  "alive":     False,
                  "latency":   0,
                  "proxyType": "None",
                  "country":   "",
                  "region":    "",
                  "city":      "",
                  "zip":       "",
                  "isp":       "",
                  "useType":   "",
                  "error":     "Unreachable"
              }

          # ── Post result back to Apps Script ────────────────────────
          def post_result(host, port, result):
              try:
                  resp = requests.post(
                      SCRIPT_URL,
                      data={
                          "action":    "proxyresult",
                          "secret":    SECRET,
                          "host":      host,
                          "port":      port,
                          "alive":     str(result["alive"]).lower(),
                          "latency":   str(result["latency"]),
                          "proxyType": result["proxyType"],
                          "country":   result["country"],
                          "region":    result["region"],
                          "city":      result["city"],
                          "zip":       result["zip"],
                          "isp":       result["isp"],
                          "useType":   result["useType"],
                          "error":     result["error"]
                      },
                      timeout=15,
                      allow_redirects=True
                  )
                  print(f"  Posted result: HTTP {resp.status_code} | {resp.text}")
              except Exception as ex:
                  print(f"  Failed to post result: {ex}")

          # ── Worker function for threading ──────────────────────────
          def process_proxy(proxy):
              host     = proxy.get("host",     "").strip()
              port     = proxy.get("port",     "").strip()
              username = proxy.get("username", "").strip() or None
              password = proxy.get("password", "").strip() or None

              if not host or not port:
                  print(f"Skipping invalid entry: {proxy}")
                  return

              with lock:
                  print(f"\nChecking {host}:{port}"
                        f" (auth={'Yes — ' + username if username else 'No'})")

              result = check_proxy(host, port, username, password)

              label = "✅ ALIVE" if result["alive"] else "❌ DEAD"
              with lock:
                  print(f"  {label} | {result['latency']}ms"
                        f" | {result['proxyType']}"
                        f" | {result['country']}"
                        f" | {result['city']}"
                        f" | ISP: {result['isp']}"
                        f" | UseType: {result['useType']}")

              post_result(host, port, result)

          # ── Step 1: Fetch pending proxies ──────────────────────────
          import time
          print("=" * 60)
          print(f"Proxy checker started: {datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}")
          print(f"Fetching pending proxies from Apps Script...")

          try:
              r = requests.post(
                  SCRIPT_URL,
                  data={"action": "getpending", "secret": SECRET},
                  timeout=30,
                  allow_redirects=True
              )
              print(f"Fetch response: HTTP {r.status_code}")
              print(f"Fetch body: {r.text[:300]}")
              response_data = r.json()
          except Exception as ex:
              print(f"FAILED to fetch pending proxies: {ex}")
              exit(0)

          if not response_data.get("ok"):
              print(f"Apps Script error: {response_data.get('error')}")
              exit(0)

          proxies = response_data.get("proxies", [])
          print(f"Found {len(proxies)} pending proxies to check")
          print("=" * 60)

          if not proxies:
              print("Nothing to check. Exiting.")
              exit(0)

          # ── Step 2: Check all proxies concurrently ─────────────────
          import os as os_module
          cpu_threads = os_module.cpu_count() or 4
          max_workers = min(20, cpu_threads * 4)
          print(f"Using {max_workers} concurrent workers")

          with concurrent.futures.ThreadPoolExecutor(max_workers=max_workers) as executor:
              futures = [executor.submit(process_proxy, p) for p in proxies]
              concurrent.futures.wait(futures)

          print("\n" + "=" * 60)
          print(f"All done: {datetime.utcnow().strftime('%Y-%m-%d %H:%M:%S UTC')}")
          PYEOF
